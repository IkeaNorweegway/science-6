<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520"
     role="img" aria-label="Plant cell structure diagram showing all major organelles without text labels">
<defs>
  <radialGradient id="cg" cx="38%" cy="38%" r="65%">
    <stop offset="0%"   stop-color="#e0f5c8"/>
    <stop offset="100%" stop-color="#bce0a0"/>
  </radialGradient>
  <radialGradient id="vg" cx="32%" cy="32%" r="68%">
    <stop offset="0%"   stop-color="#d8f0ff"/>
    <stop offset="100%" stop-color="#94cceb"/>
  </radialGradient>
  <radialGradient id="ng" cx="38%" cy="35%" r="62%">
    <stop offset="0%"   stop-color="#fffbee"/>
    <stop offset="100%" stop-color="#f0d888"/>
  </radialGradient>
  <radialGradient id="chg" cx="30%" cy="30%" r="70%">
    <stop offset="0%"   stop-color="#70d040"/>
    <stop offset="100%" stop-color="#228820"/>
  </radialGradient>
  <radialGradient id="mg" cx="35%" cy="35%" r="65%">
    <stop offset="0%"   stop-color="#ffc880"/>
    <stop offset="100%" stop-color="#e06020"/>
  </radialGradient>
</defs>

<!-- ══════════════════════════════════════════════
     CELL WALL  (thick green outer layer)
     ══════════════════════════════════════════════ -->
<rect x="18" y="10" width="664" height="500" rx="84" ry="78"
      fill="#58b832" stroke="#287018" stroke-width="2.5"/>

<!-- ══════════════════════════════════════════════
     CYTOPLASM  (interior — light green background)
     ══════════════════════════════════════════════ -->
<rect x="44" y="34" width="612" height="452" rx="68" ry="62"
      fill="url(#cg)"/>

<!-- ══════════════════════════════════════════════
     CELL MEMBRANE  (thin dashed line inside wall)
     ══════════════════════════════════════════════ -->
<rect x="44" y="34" width="612" height="452" rx="68" ry="62"
      fill="none" stroke="#228a10" stroke-width="1.8" stroke-dasharray="7,3"/>

<!-- ══════════════════════════════════════════════
     CENTRAL VACUOLE  (large — fills most of interior)
     ══════════════════════════════════════════════ -->
<ellipse cx="282" cy="260" rx="182" ry="192"
         fill="url(#vg)" stroke="#68b0d0" stroke-width="2"/>
<!-- Tonoplast (vacuole membrane — inner dashed line) -->
<ellipse cx="282" cy="260" rx="174" ry="184"
         fill="none" stroke="#88c8e0" stroke-width="1" stroke-dasharray="5,3"/>

<!-- ══════════════════════════════════════════════
     NUCLEUS
     ══════════════════════════════════════════════ -->
<circle cx="548" cy="218" r="80" fill="url(#ng)" stroke="#b89030" stroke-width="2.5"/>
<!-- Nuclear envelope inner membrane -->
<circle cx="548" cy="218" r="71" fill="none" stroke="#d8b848" stroke-width="1"
        stroke-dasharray="4,3"/>
<!-- Nuclear pores (small gaps/circles on envelope) -->
<circle cx="548" cy="138" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="592" cy="152" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="618" cy="192" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="608" cy="248" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="560" cy="296" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="504" cy="294" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="472" cy="254" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="470" cy="194" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<circle cx="492" cy="152" r="4.5" fill="#f8eeb0" stroke="#b89030" stroke-width="1.2"/>
<!-- Nucleolus -->
<ellipse cx="535" cy="204" rx="30" ry="25"
         fill="#f0c030" stroke="#987820" stroke-width="1.8"/>
<!-- Nucleolus inner density -->
<ellipse cx="532" cy="202" rx="16" ry="13"
         fill="#e8a820" stroke="none"/>

<!-- ══════════════════════════════════════════════
     CHLOROPLASTS  (4 — lens-shaped with grana)
     ══════════════════════════════════════════════ -->

<!-- CHL 1 — upper right cytoplasm (above nucleus) -->
<g transform="translate(522,74) rotate(-20)">
  <ellipse cx="0" cy="0" rx="60" ry="24" fill="url(#chg)" stroke="#1a7808" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="52" ry="17" fill="none" stroke="#228a0a" stroke-width="0.9"/>
  <!-- Grana stacks (thylakoid membranes) -->
  <line x1="-42" y1="-15" x2="-42" y2="15" stroke="#156008" stroke-width="1"/>
  <line x1="-28" y1="-19" x2="-28" y2="19" stroke="#156008" stroke-width="1"/>
  <line x1="-14" y1="-21" x2="-14" y2="21" stroke="#156008" stroke-width="1"/>
  <line x1="0"   y1="-21" x2="0"   y2="21" stroke="#156008" stroke-width="1"/>
  <line x1="14"  y1="-21" x2="14"  y2="21" stroke="#156008" stroke-width="1"/>
  <line x1="28"  y1="-19" x2="28"  y2="19" stroke="#156008" stroke-width="1"/>
  <line x1="42"  y1="-15" x2="42"  y2="15" stroke="#156008" stroke-width="1"/>
  <!-- Horizontal lamellae -->
  <line x1="-50" y1="0" x2="50" y2="0" stroke="#1a7808" stroke-width="0.6" stroke-dasharray="3,2"/>
  <!-- Starch grains -->
  <ellipse cx="-16" cy="5"  rx="10" ry="6" fill="#ecf8e4" stroke="#228a0a" stroke-width="0.7"/>
  <ellipse cx="18"  cy="-4" rx="8"  ry="5" fill="#ecf8e4" stroke="#228a0a" stroke-width="0.7"/>
</g>

<!-- CHL 2 — right cytoplasm, below nucleus -->
<g transform="translate(603,362) rotate(14)">
  <ellipse cx="0" cy="0" rx="54" ry="22" fill="url(#chg)" stroke="#1a7808" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="47" ry="15" fill="none" stroke="#228a0a" stroke-width="0.9"/>
  <line x1="-37" y1="-13" x2="-37" y2="13" stroke="#156008" stroke-width="1"/>
  <line x1="-24" y1="-16" x2="-24" y2="16" stroke="#156008" stroke-width="1"/>
  <line x1="-11" y1="-18" x2="-11" y2="18" stroke="#156008" stroke-width="1"/>
  <line x1="2"   y1="-18" x2="2"   y2="18" stroke="#156008" stroke-width="1"/>
  <line x1="15"  y1="-17" x2="15"  y2="17" stroke="#156008" stroke-width="1"/>
  <line x1="28"  y1="-15" x2="28"  y2="15" stroke="#156008" stroke-width="1"/>
  <line x1="40"  y1="-12" x2="40"  y2="12" stroke="#156008" stroke-width="1"/>
  <line x1="-46" y1="0" x2="46" y2="0" stroke="#1a7808" stroke-width="0.6" stroke-dasharray="3,2"/>
  <ellipse cx="10" cy="5" rx="9" ry="5" fill="#ecf8e4" stroke="#228a0a" stroke-width="0.7"/>
  <ellipse cx="-18" cy="-3" rx="7" ry="4" fill="#ecf8e4" stroke="#228a0a" stroke-width="0.7"/>
</g>

<!-- CHL 3 — upper strip (top cytoplasm) -->
<g transform="translate(188,55) rotate(6)">
  <ellipse cx="0" cy="0" rx="52" ry="21" fill="url(#chg)" stroke="#1a7808" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="45" ry="14" fill="none" stroke="#228a0a" stroke-width="0.9"/>
  <line x1="-35" y1="-13" x2="-35" y2="13" stroke="#156008" stroke-width="1"/>
  <line x1="-22" y1="-16" x2="-22" y2="16" stroke="#156008" stroke-width="1"/>
  <line x1="-9"  y1="-17" x2="-9"  y2="17" stroke="#156008" stroke-width="1"/>
  <line x1="4"   y1="-17" x2="4"   y2="17" stroke="#156008" stroke-width="1"/>
  <line x1="17"  y1="-16" x2="17"  y2="16" stroke="#156008" stroke-width="1"/>
  <line x1="30"  y1="-14" x2="30"  y2="14" stroke="#156008" stroke-width="1"/>
  <line x1="-44" y1="0" x2="44" y2="0" stroke="#1a7808" stroke-width="0.6" stroke-dasharray="3,2"/>
  <ellipse cx="-8" cy="4" rx="8" ry="5" fill="#ecf8e4" stroke="#228a0a" stroke-width="0.7"/>
</g>

<!-- CHL 4 — bottom cytoplasm -->
<g transform="translate(176,464) rotate(-9)">
  <ellipse cx="0" cy="0" rx="52" ry="21" fill="url(#chg)" stroke="#1a7808" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="45" ry="14" fill="none" stroke="#228a0a" stroke-width="0.9"/>
  <line x1="-35" y1="-13" x2="-35" y2="13" stroke="#156008" stroke-width="1"/>
  <line x1="-22" y1="-16" x2="-22" y2="16" stroke="#156008" stroke-width="1"/>
  <line x1="-9"  y1="-17" x2="-9"  y2="17" stroke="#156008" stroke-width="1"/>
  <line x1="4"   y1="-17" x2="4"   y2="17" stroke="#156008" stroke-width="1"/>
  <line x1="17"  y1="-16" x2="17"  y2="16" stroke="#156008" stroke-width="1"/>
  <line x1="30"  y1="-14" x2="30"  y2="14" stroke="#156008" stroke-width="1"/>
  <line x1="-44" y1="0" x2="44" y2="0" stroke="#1a7808" stroke-width="0.6" stroke-dasharray="3,2"/>
  <ellipse cx="14" cy="-3" rx="8" ry="5" fill="#ecf8e4" stroke="#228a0a" stroke-width="0.7"/>
</g>

<!-- ══════════════════════════════════════════════
     MITOCHONDRIA  (3 — orange, with cristae)
     ══════════════════════════════════════════════ -->

<!-- Mito 1 — left cytoplasm strip -->
<g transform="translate(108,196) rotate(32)">
  <ellipse cx="0" cy="0" rx="36" ry="16" fill="url(#mg)" stroke="#c05018" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="29" ry="11" fill="none" stroke="#dd6622" stroke-width="0.9"/>
  <path d="M-20,-8 C-6,0  6,0  20,-8" fill="none" stroke="#c05018" stroke-width="0.9"/>
  <path d="M-22,2  C-6,10 6,10 22,2"  fill="none" stroke="#c05018" stroke-width="0.9"/>
</g>

<!-- Mito 2 — right cytoplasm -->
<g transform="translate(636,302) rotate(-26)">
  <ellipse cx="0" cy="0" rx="34" ry="15" fill="url(#mg)" stroke="#c05018" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="27" ry="10" fill="none" stroke="#dd6622" stroke-width="0.9"/>
  <path d="M-18,-7 C-5,1  5,1  18,-7" fill="none" stroke="#c05018" stroke-width="0.9"/>
  <path d="M-20,3  C-5,10 5,10 20,3"  fill="none" stroke="#c05018" stroke-width="0.9"/>
</g>

<!-- Mito 3 — bottom cytoplasm -->
<g transform="translate(398,464) rotate(5)">
  <ellipse cx="0" cy="0" rx="32" ry="14" fill="url(#mg)" stroke="#c05018" stroke-width="1.8"/>
  <ellipse cx="0" cy="0" rx="25" ry="9"  fill="none" stroke="#dd6622" stroke-width="0.9"/>
  <path d="M-16,-6 C-4,2  4,2  16,-6" fill="none" stroke="#c05018" stroke-width="0.9"/>
  <path d="M-18,2  C-4,8  4,8  18,2"  fill="none" stroke="#c05018" stroke-width="0.9"/>
</g>

<!-- ══════════════════════════════════════════════
     ROUGH ENDOPLASMIC RETICULUM
     Two parallel wavy channels + ribosome dots
     ══════════════════════════════════════════════ -->
<path d="M468,318 C484,303 500,328 516,313 C532,298 548,323 564,310 C580,297 596,320 616,310"
      fill="none" stroke="#aa60cc" stroke-width="4.5" stroke-linecap="round"/>
<path d="M468,332 C484,317 500,342 516,327 C532,312 548,337 564,324 C580,311 596,334 616,324"
      fill="none" stroke="#aa60cc" stroke-width="4.5" stroke-linecap="round"/>
<!-- Ribosomes on RER -->
<circle cx="470" cy="322" r="4" fill="#1840bb"/>
<circle cx="484" cy="312" r="4" fill="#1840bb"/>
<circle cx="498" cy="327" r="4" fill="#1840bb"/>
<circle cx="513" cy="316" r="4" fill="#1840bb"/>
<circle cx="527" cy="304" r="4" fill="#1840bb"/>
<circle cx="542" cy="318" r="4" fill="#1840bb"/>
<circle cx="556" cy="308" r="4" fill="#1840bb"/>
<circle cx="570" cy="298" r="4" fill="#1840bb"/>
<circle cx="584" cy="312" r="4" fill="#1840bb"/>
<circle cx="598" cy="302" r="4" fill="#1840bb"/>
<circle cx="612" cy="316" r="4" fill="#1840bb"/>

<!-- ══════════════════════════════════════════════
     SMOOTH ENDOPLASMIC RETICULUM
     ══════════════════════════════════════════════ -->
<path d="M472,350 C490,335 508,360 526,345 C544,330 562,355 580,342"
      fill="none" stroke="#cc88e0" stroke-width="3.5" stroke-linecap="round"/>
<path d="M472,364 C490,349 508,374 526,359 C544,344 562,369 580,356"
      fill="none" stroke="#cc88e0" stroke-width="3.5" stroke-linecap="round"/>

<!-- ══════════════════════════════════════════════
     GOLGI APPARATUS  (stack of cisternae)
     ══════════════════════════════════════════════ -->
<g transform="translate(458,400)">
  <path d="M-52,-20 Q0,-32 52,-20" fill="none" stroke="#bb8800" stroke-width="5" stroke-linecap="round"/>
  <path d="M-54,-9  Q0,-21 54,-9"  fill="none" stroke="#cc9900" stroke-width="5" stroke-linecap="round"/>
  <path d="M-54,2   Q0,-10 54,2"   fill="none" stroke="#ddaa00" stroke-width="5" stroke-linecap="round"/>
  <path d="M-52,13  Q0,1   52,13"  fill="none" stroke="#eebb00" stroke-width="5" stroke-linecap="round"/>
  <path d="M-48,24  Q0,12  48,24"  fill="none" stroke="#ffcc22" stroke-width="5" stroke-linecap="round"/>
  <!-- Vesicles — cis face (top) -->
  <circle cx="58"  cy="-16" r="8" fill="#cc9900" stroke="#886600" stroke-width="1.2"/>
  <circle cx="62"  cy="-2"  r="7" fill="#ddaa00" stroke="#886600" stroke-width="1.2"/>
  <!-- Vesicles — trans face (bottom) -->
  <circle cx="-56" cy="16"  r="8" fill="#eebb00" stroke="#997700" stroke-width="1.2"/>
  <circle cx="-60" cy="2"   r="7" fill="#ffcc22" stroke="#997700" stroke-width="1.2"/>
  <circle cx="-60" cy="-10" r="6" fill="#cc9900" stroke="#886600" stroke-width="1.2"/>
</g>

<!-- ══════════════════════════════════════════════
     PEROXISOME
     ══════════════════════════════════════════════ -->
<circle cx="626" cy="176" r="27" fill="#e4c8f8" stroke="#8833cc" stroke-width="1.8"/>
<!-- Crystalloid core -->
<circle cx="626" cy="176" r="10" fill="#cc88ee" stroke="#8833cc" stroke-width="1.2"/>
<line x1="617" y1="167" x2="635" y2="185" stroke="#8833cc" stroke-width="0.9"/>
<line x1="617" y1="185" x2="635" y2="167" stroke="#8833cc" stroke-width="0.9"/>

